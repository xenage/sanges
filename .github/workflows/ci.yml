name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-quality-${{ runner.os }}-${{ runner.arch }}

      - name: Enforce CODE.md line limits
        run: python3 scripts/check_code_limits.py

      - name: Check formatting
        run: |
          cargo fmt --check \
            -p sagens-box-api \
            -p sagens-domain \
            -p sagens-guest-agent \
            -p sagens-guest-contract \
            -p sagens-host \
            -p sagens-libkrun \
            -p xtask

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build docs
        run: cargo doc --no-deps

      - name: Run tests
        run: cargo test

      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH} --show-stats
