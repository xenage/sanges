name: Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

concurrency:
  group: build-and-release-${{ github.sha }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: gate
        name: Decide whether this workflow should run
        run: |
          should_run=true
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            git fetch --force --tags origin
            if git tag --points-at "${GITHUB_SHA}" | grep -q .; then
              echo "Skipping main push workflow because ${GITHUB_SHA} is already tagged."
              should_run=false
            fi
          fi
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    if: needs.gate.outputs.should_run == 'true'
    needs: gate
    runs-on: ${{ matrix.os }}
    environment: apple
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-14
            platform: macos-aarch64
    env:
      ARTIFACT_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.sha) }}
      BUILD_CACHE_ROOT: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_ID: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_ID || '' }}
      TEAM_ID: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.TEAM_ID || '' }}
      BUILD_CERTIFICATE_BASE64: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.BUILD_CERTIFICATE_BASE64 || '' }}
      INSTALLER_CERTIFICATE_BASE64: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.INSTALLER_CERTIFICATE_BASE64 || '' }}
      KEYCHAIN_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.KEYCHAIN_PASSWORD || '' }}
      P12_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.P12_PASSWORD || '' }}
      INSTALLER_P12_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.INSTALLER_P12_PASSWORD || '' }}
      BUILD_LOCAL_SIGN: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && '1' || '' }}
      SAGENS_SKIP_INSTALLER: "1"
      CARGO_TARGET_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/target
      SAGENS_GUEST_OUTPUT_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/guest-output
      SAGENS_GUEST_WORK_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/guest-work
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CARGO_TARGET_DIR }}
            ${{ env.SAGENS_GUEST_OUTPUT_DIR }}
            ${{ env.SAGENS_GUEST_WORK_DIR }}
          key: release-build-${{ matrix.platform }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm-dev libclang-dev pkg-config patchelf libc6-dev libelf-dev libssl-dev libncurses-dev bison flex dwarves cpio xz-utils bc kmod python3-pyelftools

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld xz zig

      - name: Build standalone binary
        run: |
          if [[ -n "${BUILD_LOCAL_SIGN:-}" ]]; then
            ./build-local.sh --version "$ARTIFACT_VERSION" --sign
          else
            ./build-local.sh --version "$ARTIFACT_VERSION"
          fi

      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH} --show-stats

      - name: Verify macOS release signature
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        run: |
          binary="dist/sagens-${ARTIFACT_VERSION}-${{ matrix.platform }}"
          archive="${binary}.zip"
          codesign -dv --verbose=4 "$binary" 2>&1 | tee /tmp/sagens-codesign.txt
          if grep -Eq 'Signature=adhoc|TeamIdentifier=not set' /tmp/sagens-codesign.txt; then
            echo "macOS release artifact is not Developer ID signed" >&2
            exit 1
          fi
          codesign --verify --verbose=2 --strict "$binary"
          test -f "$archive"
          test -f "${archive}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.platform }}
          path: dist/sagens-${{ env.ARTIFACT_VERSION }}-${{ matrix.platform }}*
          if-no-files-found: error

  test_smoke:
    name: Smoke (${{ matrix.platform }})
    if: needs.gate.outputs.should_run == 'true'
    needs:
      - gate
      - build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-14
            platform: macos-aarch64
    env:
      ARTIFACT_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.sha) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: bundle-${{ matrix.platform }}
          path: dist

      - name: Restore executable bit
        run: chmod +x "dist/sagens-${ARTIFACT_VERSION}-${{ matrix.platform }}"

      - name: Run standalone smoke e2e
        run: |
          binary="$GITHUB_WORKSPACE/dist/sagens-${ARTIFACT_VERSION}-${{ matrix.platform }}"
          bash scripts/e2e-standalone-smoke.sh "$binary"

  test_smoke_python:
    name: Smoke Python (${{ matrix.platform }})
    if: needs.gate.outputs.should_run == 'true'
    needs:
      - gate
      - build
    runs-on: ${{ matrix.os }}
    environment: apple
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-14
            platform: macos-aarch64
    env:
      BUILD_CACHE_ROOT: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_TARGET_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/target
      SAGENS_GUEST_OUTPUT_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/guest-output
      SAGENS_GUEST_WORK_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/guest-work
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_ID: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_ID || '' }}
      TEAM_ID: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.TEAM_ID || '' }}
      BUILD_CERTIFICATE_BASE64: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.BUILD_CERTIFICATE_BASE64 || '' }}
      KEYCHAIN_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.KEYCHAIN_PASSWORD || '' }}
      P12_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.P12_PASSWORD || '' }}
      SAGENS_FORCE_SIGN: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && '1' || '' }}
      SAGENS_SKIP_INSTALLER: "1"
      SAGENS_WHEEL_BUILD_TAG: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && '1' || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CARGO_TARGET_DIR }}
            ${{ env.SAGENS_GUEST_OUTPUT_DIR }}
            ${{ env.SAGENS_GUEST_WORK_DIR }}
          key: release-build-${{ matrix.platform }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm-dev libclang-dev pkg-config patchelf libc6-dev libelf-dev libssl-dev libncurses-dev bison flex dwarves cpio xz-utils bc kmod python3-pyelftools

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld xz zig

      - name: Build standalone Python wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps -w python-dist

      - name: Install standalone Python wheel
        run: python -m pip install pytest python-dist/*.whl

      - name: Verify standalone Python payload
        run: |
          payload_json="$(mktemp)"
          tmpdir="$(mktemp -d)"
          (
            cd "$tmpdir"
            python -c 'from pathlib import Path; import json, sagens._rust; from sagens._binary import resolve_host_binary; print(json.dumps({"host_binary": str(Path(resolve_host_binary()).resolve()), "rust_ext": str(Path(sagens._rust.__file__).resolve())}))' > "$payload_json"
          )
          host_binary="$(python -c 'import json, sys; print(json.load(open(sys.argv[1]))["host_binary"])' "$payload_json")"
          rust_ext="$(python -c 'import json, sys; print(json.load(open(sys.argv[1]))["rust_ext"])' "$payload_json")"
          test -f "$host_binary"
          test -f "$rust_ext"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            if otool -L "$host_binary" | grep -q 'libkrun'; then
              echo "host binary must not dynamically link libkrun" >&2
              exit 1
            fi
            if otool -L "$rust_ext" | grep -q 'libkrun'; then
              echo "Python extension must not dynamically link libkrun" >&2
              exit 1
            fi
            codesign --verify --verbose=2 --strict "$host_binary"
            codesign --verify --verbose=2 --strict "$rust_ext"
            codesign -d --entitlements :- "$host_binary" >/tmp/sagens-python-host-entitlements.plist 2>/dev/null
            grep -q 'com.apple.security.hypervisor' /tmp/sagens-python-host-entitlements.plist
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              for target in "$host_binary" "$rust_ext"; do
                codesign -dv --verbose=4 "$target" 2>&1 | tee /tmp/sagens-python-codesign.txt
                if grep -Eq 'Signature=adhoc|TeamIdentifier=not set' /tmp/sagens-python-codesign.txt; then
                  echo "macOS Python wheel payload is not Developer ID signed: $target" >&2
                  exit 1
                fi
              done
            fi
          else
            if ldd "$host_binary" | grep -q 'libkrun'; then
              echo "host binary must not dynamically link libkrun" >&2
              exit 1
            fi
            if ldd "$rust_ext" | grep -q 'libkrun'; then
              echo "Python extension must not dynamically link libkrun" >&2
              exit 1
            fi
          fi

      - name: Run Python smoke tests
        run: python -m pytest python/tests -q --ignore=python/tests/test_e2e.py

      - name: Run macOS Python standalone daemon smoke
        if: runner.os == 'macOS'
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python - <<'PY'
          from tempfile import TemporaryDirectory

          from sagens import Daemon

          with TemporaryDirectory(prefix="sagens-python-macos-smoke-") as state_dir:
              with Daemon.start(state_dir=state_dir) as daemon:
                  box = daemon.create_box()
                  assert str(box.box_id)
                  assert daemon.get_box(box.box_id).box_id == box.box_id
          PY

      - name: Run macOS Python standalone BOX smoke
        if: runner.os == 'macOS' && env.SAGENS_RUN_MACOS_REAL_BOX_SMOKE == '1'
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python - <<'PY'
          from tempfile import TemporaryDirectory

          from sagens import Daemon

          with TemporaryDirectory(prefix="sagens-python-macos-box-smoke-") as state_dir:
              with Daemon.start(state_dir=state_dir) as daemon:
                  box = daemon.create_box()
                  box.start()
                  result = box.exec_bash("echo wheel-ok && uname -s")
                  assert result.exit_status.success
                  assert b"wheel-ok" in result.stdout
                  box.stop()
          PY

      - name: Upload Python wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist-${{ matrix.platform }}
          path: python-dist/*.whl
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH} --show-stats

  test_linux_full:
    name: Full Linux E2E (xenage-kvm)
    if: needs.gate.outputs.should_run == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs:
      - gate
      - build
    runs-on: xenage-kvm
    env:
      ARTIFACT_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.sha) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: bundle-linux-x86_64
          path: dist

      - name: Restore executable bit
        run: chmod +x "dist/sagens-${ARTIFACT_VERSION}-linux-x86_64"

      - name: Verify KVM is available
        run: |
          test -c /dev/kvm
          ls -l /dev/kvm

      - name: Run standalone full e2e
        run: |
          binary="$GITHUB_WORKSPACE/dist/sagens-${ARTIFACT_VERSION}-linux-x86_64"
          bash scripts/e2e-standalone.sh "$binary"

  test_linux_full_python:
    name: Full Python E2E (xenage-kvm)
    if: needs.gate.outputs.should_run == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs:
      - gate
      - test_smoke_python
    runs-on: xenage-kvm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify KVM is available
        run: |
          test -c /dev/kvm
          ls -l /dev/kvm

      - name: Download standalone Python wheel
        uses: actions/download-artifact@v8
        with:
          name: python-dist-linux-x86_64
          path: python-dist

      - name: Install standalone Python wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest python-dist/*.whl

      - name: Run full Python e2e
        run: SAGENS_RUN_E2E=1 python -m pytest python/tests/test_e2e.py -q

  release:
    name: Release
    if: needs.gate.outputs.should_run == 'true' && startsWith(github.ref, 'refs/tags/')
    needs:
      - gate
      - build
      - test_smoke
      - test_smoke_python
      - test_linux_full
      - test_linux_full_python
    runs-on: ubuntu-24.04
    environment: apple
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: verify
        name: Verify tag points into main
        run: |
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF")"
          git fetch origin main
          if git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because $GITHUB_REF does not point into origin/main."
          fi

      - id: package_meta
        name: Verify tag matches package version
        if: steps.verify.outputs.should_release == 'true'
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          match = re.fullmatch(r"v?([0-9]+(?:\.[0-9]+)*(?:(?:a|b|rc)[0-9]+)?)", tag)
          if match is None:
              raise SystemExit(
                  f"release tag {tag!r} must look like vX.Y.Z or X.Y.Z for PyPI publishing"
              )

          tag_version = match.group(1)
          python_version = tomllib.loads(Path("python/pyproject.toml").read_text())["project"]["version"]

          if tag_version != python_version:
              raise SystemExit(
                  f"tag {tag!r} resolves to version {tag_version}, but package version is {python_version}"
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={python_version}\n")
          PY

      - name: Download release artifacts
        if: steps.verify.outputs.should_release == 'true'
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: bundle-*
          merge-multiple: true

      - name: Download Python wheel artifacts
        if: steps.verify.outputs.should_release == 'true'
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: python-dist-*
          merge-multiple: true

      - uses: actions/setup-python@v6
        if: steps.verify.outputs.should_release == 'true'
        with:
          python-version: "3.12"

      - name: Remove obsolete release assets
        if: steps.verify.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_ids="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
              --jq '.assets[]? | select(.name | test("\\.whl$|sagens-.*-macos-x86_64(\\.zip(\\.sha256)?|\\.sha256)?$|sagens-.*-macos-aarch64(\\.sha256)?$")) | .id' \
              2>/dev/null || true
          )"
          if [[ -z "$asset_ids" ]]; then
            exit 0
          fi
          while IFS= read -r asset_id; do
            [[ -n "$asset_id" ]] || continue
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          done <<< "$asset_ids"

      - name: Publish GitHub release
        if: steps.verify.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          files: |
            release-assets/sagens-*-linux-x86_64
            release-assets/sagens-*-linux-x86_64.sha256
            release-assets/sagens-*-linux-aarch64
            release-assets/sagens-*-linux-aarch64.sha256
            release-assets/sagens-*-macos-aarch64.zip
            release-assets/sagens-*-macos-aarch64.zip.sha256
            release-assets/*.whl

      - name: Publish Python distributions to PyPI
        if: steps.verify.outputs.should_release == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${TWINE_PASSWORD:-}" ]]; then
            echo "PYPI_API_TOKEN secret is not configured." >&2
            exit 1
          fi
          python -m pip install --upgrade pip twine
          python -m twine check release-assets/*.whl
          python -m twine upload --skip-existing --disable-progress-bar release-assets/*.whl
