name: Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

concurrency:
  group: build-and-release-${{ github.sha }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: gate
        name: Decide whether this workflow should run
        run: |
          should_run=true
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            git fetch --force --tags origin
            if git tag --points-at "${GITHUB_SHA}" | grep -q .; then
              echo "Skipping main push workflow because ${GITHUB_SHA} is already tagged."
              should_run=false
            fi
          fi
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    if: needs.gate.outputs.should_run == 'true'
    needs: gate
    runs-on: ${{ matrix.os }}
    environment: apple
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-14
            platform: macos-aarch64
    env:
      ARTIFACT_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.sha) }}
      BUILD_CACHE_ROOT: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_ID: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_ID || '' }}
      TEAM_ID: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.TEAM_ID || '' }}
      BUILD_CERTIFICATE_BASE64: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.BUILD_CERTIFICATE_BASE64 || '' }}
      INSTALLER_CERTIFICATE_BASE64: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.INSTALLER_CERTIFICATE_BASE64 || '' }}
      KEYCHAIN_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.KEYCHAIN_PASSWORD || '' }}
      P12_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.P12_PASSWORD || '' }}
      INSTALLER_P12_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && secrets.INSTALLER_P12_PASSWORD || '' }}
      BUILD_LOCAL_SIGN: ${{ startsWith(matrix.os, 'macos-') && startsWith(github.ref, 'refs/tags/') && '1' || '' }}
      SAGENS_SKIP_INSTALLER: "1"
      CARGO_TARGET_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/target
      SAGENS_RUNTIME_BUNDLE_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/runtime
      SAGENS_GUEST_OUTPUT_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/guest-output
      SAGENS_GUEST_WORK_DIR: ${{ github.workspace }}/.build-cache/${{ matrix.platform }}/guest-work
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CARGO_TARGET_DIR }}
            ${{ env.SAGENS_GUEST_OUTPUT_DIR }}
            ${{ env.SAGENS_GUEST_WORK_DIR }}
          key: release-build-${{ matrix.platform }}

      - name: Restore runtime bundle cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SAGENS_RUNTIME_BUNDLE_DIR }}
          key: release-runtime-${{ matrix.platform }}

      - name: Restore libkrunfw build cache
        if: startsWith(matrix.platform, 'linux-')
        uses: actions/cache@v5
        with:
          path: |
            third_party/upstream/libkrunfw/tarballs
            third_party/upstream/libkrunfw/kernel.c
            third_party/upstream/libkrunfw/qboot.c
            third_party/upstream/libkrunfw/initrd.c
            third_party/upstream/libkrunfw/libkrunfw*.so*
          key: release-libkrunfw-${{ matrix.platform }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm-dev libclang-dev pkg-config patchelf libc6-dev libelf-dev libssl-dev libncurses-dev bison flex dwarves cpio xz-utils bc kmod python3-pyelftools

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld xz zig

      - name: Install macOS Intel HVF deps
        if: matrix.platform == 'macos-x86_64'
        run: brew install qemu

      - name: Build standalone binary
        run: |
          if [[ -n "${BUILD_LOCAL_SIGN:-}" ]]; then
            ./build-local.sh --version "$ARTIFACT_VERSION" --sign
          else
            ./build-local.sh --version "$ARTIFACT_VERSION"
          fi

      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH} --show-stats

      - name: Verify macOS release signature
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        run: |
          binary="dist/sagens-${ARTIFACT_VERSION}-${{ matrix.platform }}"
          archive="${binary}.zip"
          codesign -dv --verbose=4 "$binary" 2>&1 | tee /tmp/sagens-codesign.txt
          if grep -Eq 'Signature=adhoc|TeamIdentifier=not set' /tmp/sagens-codesign.txt; then
            echo "macOS release artifact is not Developer ID signed" >&2
            exit 1
          fi
          codesign --verify --verbose=2 --strict "$binary"
          test -f "$archive"
          test -f "${archive}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.platform }}
          path: dist/sagens-${{ env.ARTIFACT_VERSION }}-${{ matrix.platform }}*
          if-no-files-found: error

  test_smoke:
    name: Smoke (${{ matrix.platform }})
    if: needs.gate.outputs.should_run == 'true'
    needs:
      - gate
      - build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-14
            platform: macos-aarch64
    env:
      ARTIFACT_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.sha) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: bundle-${{ matrix.platform }}
          path: dist

      - name: Restore executable bit
        run: chmod +x "dist/sagens-${ARTIFACT_VERSION}-${{ matrix.platform }}"

      - name: Run standalone smoke e2e
        run: |
          binary="$GITHUB_WORKSPACE/dist/sagens-${ARTIFACT_VERSION}-${{ matrix.platform }}"
          bash scripts/e2e-standalone-smoke.sh "$binary"

  test_linux_full:
    name: Full Linux E2E (xenage-kvm)
    if: needs.gate.outputs.should_run == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs:
      - gate
      - build
    runs-on: xenage-kvm
    env:
      ARTIFACT_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.sha) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: bundle-linux-x86_64
          path: dist

      - name: Restore executable bit
        run: chmod +x "dist/sagens-${ARTIFACT_VERSION}-linux-x86_64"

      - name: Verify KVM is available
        run: |
          test -c /dev/kvm
          ls -l /dev/kvm

      - name: Run standalone full e2e
        run: |
          binary="$GITHUB_WORKSPACE/dist/sagens-${ARTIFACT_VERSION}-linux-x86_64"
          bash scripts/e2e-standalone.sh "$binary"

  release:
    name: Release
    if: needs.gate.outputs.should_run == 'true' && startsWith(github.ref, 'refs/tags/')
    needs:
      - gate
      - build
      - test_smoke
      - test_linux_full
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: verify
        name: Verify tag points into main
        run: |
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF")"
          git fetch origin main
          if git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because $GITHUB_REF does not point into origin/main."
          fi

      - name: Download release artifacts
        if: steps.verify.outputs.should_release == 'true'
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: bundle-*
          merge-multiple: true

      - name: Remove obsolete macOS raw assets
        if: steps.verify.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_ids="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
              --jq '.assets[]? | select(.name | test("sagens-.*-macos-(x86_64|aarch64)(\\.sha256)?$")) | .id' \
              2>/dev/null || true
          )"
          if [[ -z "$asset_ids" ]]; then
            exit 0
          fi
          while IFS= read -r asset_id; do
            [[ -n "$asset_id" ]] || continue
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          done <<< "$asset_ids"

      - name: Publish GitHub release
        if: steps.verify.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          files: |
            release-assets/sagens-*-linux-x86_64
            release-assets/sagens-*-linux-x86_64.sha256
            release-assets/sagens-*-linux-aarch64
            release-assets/sagens-*-linux-aarch64.sha256
            release-assets/sagens-*-macos-x86_64.zip
            release-assets/sagens-*-macos-x86_64.zip.sha256
            release-assets/sagens-*-macos-aarch64.zip
            release-assets/sagens-*-macos-aarch64.zip.sha256
