name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    needs: verify-tag
    if: needs.verify-tag.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-14
            platform: macos-aarch64
          - os: macos-13
            platform: macos-x86_64
    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT_VERSION: ${{ github.ref_name }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_ID: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_ID || '' }}
      TEAM_ID: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.TEAM_ID || '' }}
      BUILD_CERTIFICATE_BASE64: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.BUILD_CERTIFICATE_BASE64 || '' }}
      INSTALLER_CERTIFICATE_BASE64: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.INSTALLER_CERTIFICATE_BASE64 || '' }}
      KEYCHAIN_PASSWORD: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.KEYCHAIN_PASSWORD || '' }}
      P12_PASSWORD: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.P12_PASSWORD || '' }}
      INSTALLER_P12_PASSWORD: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.INSTALLER_P12_PASSWORD || '' }}
      BUILD_LOCAL_SIGN: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && '1' || '' }}
      SAGENS_SKIP_INSTALLER: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs gnupg tar clang lld pkg-config patchelf libc6-dev libelf-dev libssl-dev libncurses-dev bison flex dwarves cpio xz-utils

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld xz e2fsprogs gnupg zig
          brew tap slp/krun
          brew install krunvm

      - name: Build standalone release package
        run: |
          if [[ -n "${BUILD_LOCAL_SIGN:-}" ]]; then
            ./build-local.sh --version "$ARTIFACT_VERSION" --sign
          else
            ./build-local.sh --version "$ARTIFACT_VERSION"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: dist/sagens-${{ github.ref_name }}-${{ matrix.platform }}*

  publish-release:
    needs:
      - verify-tag
      - build-release
    if: needs.verify-tag.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.sha256
            release-assets/sagens-*
