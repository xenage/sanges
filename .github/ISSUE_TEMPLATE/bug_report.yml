name: Bug report
description: Report a reproducible defect in sagens.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug report.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Exact steps, commands, or inputs to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host OS, architecture, commit or release version, and any relevant configuration.
    validations:
      required: true
